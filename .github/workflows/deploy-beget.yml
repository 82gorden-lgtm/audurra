# Generic Beget FTP deploy for sites created from this template.
#
# GitHub secrets:
#   BEGET_FTP_HOST     - FTP host from Beget panel
#   BEGET_FTP_USER     - FTP user
#   BEGET_FTP_PASSWORD - FTP password
#
# GitHub variable:
#   BEGET_SERVER_DIR   - target directory, for example: new-site.ru/public_html/
#
# Server-only files after first deploy:
#   catalog/api/config.local.php   - users and password hashes
#   contacts/api/config.local.php  - SMTP, recipients, captcha secret
#   catalog/api/data/              - must be writable by PHP for edits

name: Deploy to Beget (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-beget
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to Beget
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.BEGET_FTP_HOST }}
          username: ${{ secrets.BEGET_FTP_USER }}
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ vars.BEGET_SERVER_DIR }}
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            Dockerfile
            .dockerignore
            **/__pycache__/**
            **/*.pyc
            .cursor/**
            catalog/api/config.local.php
            contacts/api/config.local.php
            contacts/api/data/rate_state.json
